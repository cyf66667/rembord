<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>背单词 App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container" id="app">
    
    <div id="login-screen" class="screen active">
        <h2>登录背单词</h2><p class="subtitle">记录你的每一次进步</p>
        <div class="input-group"><input type="tel" id="phone" placeholder="请输入手机号"></div>
        <button class="btn" id="login-btn">手机号登录</button>
    </div>

    <div id="setup-screen" class="screen">
        <h2>完善个人信息</h2>
        <div class="avatar-preview" id="avatar-preview"></div>
        <div class="input-group"><input type="text" id="nickname" placeholder="请输入你的昵称"></div>
        <button class="btn" id="setup-btn">进入主页</button>
    </div>

    <div id="main-screen" class="screen main-layout">
        <div class="sidebar">
            <div class="sidebar-avatar" id="sidebar-avatar"></div>
            <div class="divider"></div>
            <div class="book-list" id="book-list"></div>
        </div>

        <div class="main-content">
            
            <div id="tab-learn" class="tab-content active">
                
                <div class="empty-state" id="import-state">
                    <span style="font-size:40px; margin-bottom: 10px;">📚</span>
                    <div class="input-group">
                        <select id="book-select">
                            <option value="" disabled selected>-- 请选择本地词库 --</option>
                            <option value="cet4">四级核心词汇</option>
                            <option value="cet6">六级高频词汇</option>
                            <option value="ielts">雅思红宝书</option>
                        </select>
                    </div>
                    <div class="input-group" style="display:flex; gap:10px; text-align: left;">
                        <div style="flex:1;">
                            <label style="font-size:12px; color:#aaa;">开始日期</label>
                            <input type="date" id="start-date">
                        </div>
                        <div style="flex:1;">
                            <label style="font-size:12px; color:#aaa;">目标完成日</label>
                            <input type="date" id="end-date">
                        </div>
                    </div>
                    <button class="btn" id="import-btn">打乱顺序并生成任务</button>
                </div>
                
                <div id="learning-state" style="display:none; flex-direction:column; height:100%;">
                    <div class="word-list-header">
                        <span id="current-book-title">四级词汇</span>
                        <span id="daily-task-count" style="font-size: 13px; color: #4CAF50; font-weight: normal;">今日任务: 0词</span>
                    </div>
                    
                    <div class="word-list-container" id="word-list-container"></div>
                    
                    <div class="learning-actions">
                        <button class="action-outline-btn" id="view-unfamiliar-btn">📖 查看生词本</button>
                        <button class="action-primary-btn" id="setup-dictation-btn">✍️ 默写已背单词</button>
                    </div>
                </div>
            </div>

            <div id="tab-dictate" class="tab-content"><div class="empty-state">🎧 听写模式</div></div>
            <div id="tab-garden" class="tab-content"><div class="empty-state">🌻 能量花园</div></div>

            <div class="bottom-nav">
                <div class="nav-item active" data-tab="learn">📖 学习</div>
                <div class="nav-item" data-tab="dictate">🎧 听写</div>
                <div class="nav-item" data-tab="garden">🌻 花园</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="unfamiliar-modal">
        <div class="modal-card" style="height: 80%; display: flex; flex-direction: column;">
            <div class="close-modal" onclick="closeModal('unfamiliar-modal')">×</div>
            <h3 style="margin-bottom: 20px;">📖 我的生词本</h3>
            <div id="unfamiliar-content" style="flex:1; overflow-y: auto;">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="dictation-setup-modal">
        <div class="modal-card">
            <div class="close-modal" onclick="closeModal('dictation-setup-modal')">×</div>
            <h3 style="margin-bottom: 20px; text-align: center;">选择默写模式</h3>
            <p style="font-size:12px; color:#888; text-align:center; margin-bottom: 20px;">范围：今日已处理词汇 + 随机10个历史词汇</p>
            
            <button class="btn" style="margin-bottom: 15px; background: #2196F3;" onclick="startDictation('hide-cn')">
                掩盖中文 (看英文写中文)
            </button>
            <button class="btn" style="background: #FF9800;" onclick="startDictation('hide-en')">
                掩盖英文 (看中文写英文)
            </button>
        </div>
    </div>

    <div id="dictation-screen" class="screen" style="z-index: 100; background: #fff; position: absolute; top:0; left:0; width: 100%; display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <span style="color:#999; cursor: pointer; font-size: 20px;" onclick="exitDictation()">🔙 退出</span>
            <span id="dictation-progress" style="font-weight: bold; color: #4CAF50;">1 / 10</span>
        </div>
        
        <div class="dictation-card">
            <div id="dictation-prompt" style="font-size: 24px; font-weight: bold; color: #333; margin-bottom: 30px; text-align: center;">
                Prompt
            </div>
            <div class="input-group">
                <input type="text" id="dictation-input" placeholder="请输入答案..." autocomplete="off">
            </div>
            
            <div id="dictation-answer-area" style="display: none; margin-top: 20px; padding: 15px; background: #f0fdf4; border-radius: 10px; color: #2e7d32;">
                <p style="font-size:12px; color:#666; margin-bottom:5px;">正确答案：</p>
                <div id="dictation-correct-answer" style="font-size: 18px; font-weight: bold;">Answer</div>
            </div>
        </div>
        
        <div style="margin-top: auto; padding-bottom: 20px;">
            <button class="btn" id="dictation-submit-btn" onclick="checkDictation()">提交查看答案</button>
            <button class="btn" id="dictation-next-btn" style="display:none; background:#2196F3;" onclick="nextDictation()">下一个</button>
        </div>
    </div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
