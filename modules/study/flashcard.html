<div class="flashcard-module">
    <div class="card-header">
        <span class="close-btn" id="exit-study-btn">🔙 返回</span>
        <span class="progress-text" id="study-progress">1 / 20</span>
    </div>

    <div class="card-scene" id="card-scene">
        <div class="card-element" id="word-card">
            <div class="card-face card-front">
                <h1 id="fc-word">Loading...</h1>
                <p class="phonetic" id="fc-phonetic"></p>
                <div class="click-hint">点击卡片看中文释义</div>
            </div>
            <div class="card-face card-back">
                <h2 id="fc-word-back"></h2>
                <p class="translation" id="fc-translation"></p>
            </div>
        </div>
    </div>

    <div class="card-actions" id="card-actions">
        <button class="action-btn btn-unknown" id="btn-unknown">✖ 不认识</button>
        <button class="action-btn btn-known" id="btn-known">✔ 认识</button>
    </div>
</div>
